<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>MedScan AI | Medical Imaging Detection</title>
    <link rel="stylesheet" href="./style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="topbar">
      <div class="logo-area">
        <span class="logo-icon">◈</span>
        <h1>MedScan <span>AI</span></h1>
      </div>
      <div class="controls">
        <button id="clearBtn" class="secondary">Clear Session</button>
        <button id="runBtn" class="primary" disabled>Run Analysis</button>
      </div>
    </header>

    <main class="grid">
      <section class="card">
        <div class="card-header">
          <h2>Patient Input</h2>
          <span class="step-tag">Step 1</span>
        </div>

        <div id="dropzone" class="dropzone">
          <div class="dz-content">
            <p><strong>Drag & drop</strong> scan or</p>
            <label class="fileLabel">
              Browse Files
              <input id="fileInput" type="file" accept="image/*" />
            </label>
          </div>
        </div>

        <div class="previewBlock">
          <div class="imgFrame">
            <img id="inputPreview" alt="Input preview" style="display: none" />
            <div id="inputPlaceholder" class="placeholder">
              <p>Waiting for Upload...</p>
            </div>
          </div>
          <div id="fileMeta" class="meta"></div>
        </div>
      </section>

      <section class="card">
        <div class="card-header">
          <h2>Diagnostic Results</h2>
          <span class="step-tag">Step 2</span>
        </div>

        <div class="status-ribbon">
          <div id="status" class="status idle">System Idle</div>
          <div id="latency" class="meta"></div>
        </div>

        <div class="result-layout">
          <div class="output-container">
            <div class="imgFrame main-result">
              <img
                id="outputPreview"
                alt="Output preview"
                style="display: none"
              />
              <div id="outputPlaceholder" class="placeholder">
                <p>Awaiting Analysis</p>
              </div>
            </div>

            <div class="view-toggle">
              <button id="showBoxBtn" class="toggle-btn" disabled>
                Bounding Box
              </button>
              <button id="showHeatmapBtn" class="toggle-btn" disabled>
                Heatmap
              </button>
              <button
                id="downloadBtn"
                class="download-icon"
                title="Download"
                disabled
              >
                ⤓
              </button>
            </div>
          </div>

          <div class="analysis-panel">
            <div id="visual-metrics" class="metrics-display">
              <div class="metric-item">
                <label>Detection Status</label>
                <div id="detection-badge" class="badge">N/A</div>
              </div>

              <div class="metric-item">
                <div class="label-row">
                  <label>Confidence Level</label>
                  <span id="prob-value">0%</span>
                </div>
                <div class="progress-bar">
                  <div
                    id="prob-fill"
                    class="progress-fill"
                    style="width: 0%"
                  ></div>
                </div>
              </div>

              <div class="details-list">
                <div class="detail">
                  <small>Detected:</small> <span id="meta-detected">-</span>
                </div>
                <div class="detail">
                  <small>Model:</small> <span id="meta-model">-</span>
                </div>
                <div class="detail">
                  <small>Layer:</small> <span id="meta-layer">-</span>
                </div>
                <div class="detail">
                  <small>Stage 2:</small> <span id="meta-stage2">-</span>
                </div>
              </div>
            </div>

            <div class="options-box">
              <h3>Configuration</h3>
              <div class="opt-grid">
                <div class="opt-group">
                  <label>Threshold</label>
                  <input
                    id="threshold"
                    type="number"
                    step="0.05"
                    min="0"
                    max="1"
                    value="0.50"
                  />
                </div>
                <div class="opt-group">
                  <label>Stage 1 Model</label>
                  <select id="stage1Model">
                    <option value="efficientnet_stage1">
                      EfficientNet Stage 1
                    </option>
                    <option value="densenet_stage1">DenseNet Stage 1</option>
                  </select>
                </div>
                <div class="opt-group">
                  <label>Stage 2 Model</label>
                  <select id="stage2Model">
                    <option value="efficientnet_stage2">
                      EfficientNet Stage 2
                    </option>
                    <option value="densenet_stage2">DenseNet Stage 2</option>
                  </select>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="server-info">
          <h3>Server Response</h3>
          <pre id="metrics" class="meta"></pre>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
